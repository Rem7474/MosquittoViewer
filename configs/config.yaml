server:
  port: 8080
  host: "127.0.0.1"

# Multiple log sources – add as many entries as needed.
logs:
  - name: "mosquitto"
    path: "/var/log/mosquitto/mosquitto.log"
    format: "mosquitto_standard"
    buffer_size: 500
    read_existing_on_start: true

  # Example: watch a second file with a custom regex
  # - name: "syslog"
  #   path: "/var/log/syslog"
  #   format: "custom"
  #   custom_regex: '^(?P<ts>\w{3}\s+\d+\s+[\d:]+)\s+\S+\s+(?P<msg>.+)$'
  #   buffer_size: 200
  #   read_existing_on_start: false

auth:
  users:
    - username: "admin"
      password_hash: "$2a$12$REMPLACER_PAR_VRAI_HASH"
  jwt:
    private_key_path: "./configs/jwt_rs256.pem"
    public_key_path: "./configs/jwt_rs256_pub.pem"
    access_token_ttl: "15m"
    refresh_token_ttl: "168h"

sqlite:
  enabled: false
  path: "./mosquitto-viewer.db"

debug: false
