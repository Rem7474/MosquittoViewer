# Apache vhost for MosquittoViewer behind an upstream reverse proxy/TLS terminator
# This file is HTTP-only (no local TLS termination).
# Required modules:
# a2enmod headers proxy proxy_http proxy_wstunnel rewrite ratelimit

<VirtualHost *:80>
    ServerName mosquitto-viewer.internal

    # Security headers
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:"

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader setifempty X-Forwarded-Proto "http"

    # Simple auth endpoint rate limiting (mod_ratelimit)
    <Location /api/auth>
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 32
    </Location>

    # WebSocket upgrade route
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{REQUEST_URI} ^/api/ws [NC]
    RewriteRule ^/api/ws/(.*) ws://127.0.0.1:8080/api/ws/$1 [P,L]
    RewriteRule ^/api/ws$ ws://127.0.0.1:8080/api/ws [P,L]

    ProxyPass        /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/mosquitto-viewer-http-error.log
    CustomLog ${APACHE_LOG_DIR}/mosquitto-viewer-http-access.log combined
</VirtualHost>
