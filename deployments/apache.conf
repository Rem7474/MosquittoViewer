# Apache vhost for MosquittoViewer (HTTPS + reverse proxy + WebSocket)
# Required modules:
# a2enmod ssl headers proxy proxy_http proxy_wstunnel rewrite ratelimit

<VirtualHost *:443>
    ServerName mosquitto-viewer.internal

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/mv.crt
    SSLCertificateKeyFile /etc/ssl/private/mv.key
    SSLProtocol -all +TLSv1.3

    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Content-Security-Policy "default-src 'self'; connect-src 'self' wss:"

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"

    # Simple auth endpoint rate limiting (mod_ratelimit)
    <Location /api/auth>
        SetOutputFilter RATE_LIMIT
        SetEnv rate-limit 32
    </Location>

    # WebSocket upgrade route
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{REQUEST_URI} ^/api/ws [NC]
    RewriteRule ^/api/ws/(.*) ws://127.0.0.1:8080/api/ws/$1 [P,L]
    RewriteRule ^/api/ws$ ws://127.0.0.1:8080/api/ws [P,L]

    ProxyPass        /api/ http://127.0.0.1:8080/api/
    ProxyPassReverse /api/ http://127.0.0.1:8080/api/

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/mosquitto-viewer-error.log
    CustomLog ${APACHE_LOG_DIR}/mosquitto-viewer-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName mosquitto-viewer.internal
    Redirect permanent / https://mosquitto-viewer.internal/
</VirtualHost>
