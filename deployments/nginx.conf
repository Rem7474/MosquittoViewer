limit_req_zone $binary_remote_addr zone=mv_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=mv_api:10m  rate=100r/m;

server {
    listen 443 ssl http2;
    server_name mosquitto-viewer.internal;

    ssl_certificate     /etc/ssl/certs/mv.crt;
    ssl_certificate_key /etc/ssl/private/mv.key;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss:";

    location /api/auth {
        limit_req zone=mv_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ws {
        limit_req zone=mv_api burst=10;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        limit_req zone=mv_api burst=20;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
    }
}

server {
    listen 80;
    server_name mosquitto-viewer.internal;
    return 301 https://$host$request_uri;
}
